<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AmbiUI | Settings</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="confirm" style="display: none">
      <p>
        Are you sure you want to delete all data? This action cannot be undone.
      </p>
      <button id="btn_cancel_delete">No, keep my data</button>
      <button id="btn_confirm_delete">Yes, delete all data</button>
    </div>

    <div class="headline">
      <p id="pheadline">Settings</p>
    </div>

    <div class="settings">
      <button id="btn_back">Back</button>
      <button class="btn_delete_all" id="btn_delete_all">
        Delete all data
      </button>
    </div>
  </body>
  <script src="../script/settings.js"></script>
</html>
